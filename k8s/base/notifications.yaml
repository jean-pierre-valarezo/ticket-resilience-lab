apiVersion: v1
kind: Service
metadata:
  name: notifications
  namespace: ticket-lab
  labels:
    app: notifications
spec:
  selector:
    app: notifications
  ports:
    - name: http
      port: 8004
      targetPort: 8004
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications
  namespace: ticket-lab
  labels:
    app: notifications
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notifications
  template:
    metadata:
      labels:
        app: notifications
    spec:
      containers:
        - name: notifications
          image: ticket-resilience-lab-notifications:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8004
          env:
            - name: NOTIFICATION_DELAY_MS
              value: "0"
            - name: NOTIFICATION_FAILURE_RATE
              value: "0"
          readinessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
