apiVersion: v1
kind: Service
metadata:
  name: payments
  namespace: ticket-lab
  labels:
    app: payments
spec:
  selector:
    app: payments
  ports:
    - name: http
      port: 8003
      targetPort: 8003
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments
  namespace: ticket-lab
  labels:
    app: payments
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments
  template:
    metadata:
      labels:
        app: payments
    spec:
      containers:
        - name: payments
          image: ticket-resilience-lab-payments:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8003
          env:
            - name: PAYMENT_DELAY_MS
              value: "0"
            - name: PAYMENT_FAILURE_RATE
              value: "0"
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
